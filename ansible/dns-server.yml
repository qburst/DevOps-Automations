---
- name: Configure DNS Server using dnsmasq
  hosts: dns_servers
  become: yes
  vars:
    dns_domain: qburst.int
    dns_static_records:
      - { name: 'server1.qburst.int', ip: '10.0.0.10' }
      - { name: 'server2.qbutst.int', ip: '10.0.0.11' }
    dns_listen_addresses:
      - "127.0.0.1"
      - "10.0.16.1" # Pls replace with the DNS server's actual IP
  roles:
    - role: dns-server
